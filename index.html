<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot TP 5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chat-container {
            height: calc(100vh - 160px);
        }
        .message-bubble {
            max-width: 80%;
            word-wrap: break-word;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <div class="max-w-3xl mx-auto h-screen flex flex-col p-4">
        <!-- Header -->
        <header class="bg-white border-b p-4 rounded-t-2xl shadow-sm flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold">
                    AI
                </div>
                <div>
                    <h1 class="font-bold text-lg leading-tight">Gemini Chatbot</h1>
                    <p class="text-xs text-green-500 flex items-center gap-1">
                        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> Online
                    </p>
                </div>
            </div>
            <div class="text-xs text-slate-400 font-mono">TP 5 - GitHub Project</div>
        </header>

        <!-- Chat Area -->
        <main id="chatWindow" class="bg-white chat-container overflow-y-auto p-4 space-y-4 flex flex-col border-x">
            <!-- Initial Message -->
            <div class="flex justify-start">
                <div class="message-bubble bg-slate-100 text-slate-800 p-3 rounded-2xl rounded-tl-none shadow-sm">
                    Hello! I'm your AI assistant for TP 5. How can I help you today?
                </div>
            </div>
        </main>

        <!-- Loading Indicator -->
        <div id="loadingIndicator" class="hidden bg-white px-4 py-2 border-x">
            <div class="flex items-center gap-2 text-slate-400 text-sm italic">
                <svg class="animate-spin h-4 w-4 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                AI is thinking...
            </div>
        </div>

        <!-- Input Area -->
        <footer class="bg-white p-4 rounded-b-2xl shadow-lg border">
            <form id="chatForm" class="flex gap-2">
                <input 
                    type="text" 
                    id="userInput" 
                    placeholder="Type your message here..." 
                    class="flex-1 bg-slate-100 border-none rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                    required
                >
                <button 
                    type="submit" 
                    class="bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-xl transition-colors shadow-md disabled:opacity-50"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                    </svg>
                </button>
            </form>
        </footer>
    </div>

    <!-- Custom Modal for Errors -->
    <div id="errorModal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white p-6 rounded-2xl max-w-sm w-full shadow-2xl">
            <h3 class="text-red-600 font-bold text-lg mb-2">Connection Error</h3>
            <p id="errorMessage" class="text-slate-600 mb-4">Something went wrong while connecting to the AI.</p>
            <button onclick="closeModal()" class="w-full bg-slate-800 text-white py-2 rounded-lg font-medium">Dismiss</button>
        </div>
    </div>

    <script>
        // API Configuration
        const apiKey = ""; // Environment handles the key automatically
        const modelName = "gemini-2.5-flash-preview-09-2025";
        const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;

        const chatWindow = document.getElementById('chatWindow');
        const chatForm = document.getElementById('chatForm');
        const userInput = document.getElementById('userInput');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const errorModal = document.getElementById('errorModal');
        const errorMessage = document.getElementById('errorMessage');

        // Manage chat history to give the AI context
        let messageHistory = [];

        function appendMessage(role, text) {
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            
            const bubbleClass = role === 'user' 
                ? 'bg-blue-600 text-white rounded-tr-none' 
                : 'bg-slate-100 text-slate-800 rounded-tl-none';

            div.innerHTML = `
                <div class="message-bubble ${bubbleClass} p-3 rounded-2xl shadow-sm">
                    ${text.replace(/\n/g, '<br>')}
                </div>
            `;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function closeModal() {
            errorModal.classList.add('hidden');
        }

        // Exponential backoff fetch implementation
        async function fetchWithRetry(query, retries = 5, delay = 1000) {
            const payload = {
                contents: [
                    ...messageHistory,
                    { parts: [{ text: query }] }
                ]
            };

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    throw new Error(`HTTP Error: ${response.status}`);
                }

                return await response.json();
            } catch (error) {
                if (retries > 0) {
                    // Exponential backoff: 1s, 2s, 4s, 8s, 16s
                    await new Promise(resolve => setTimeout(resolve, delay));
                    return fetchWithRetry(query, retries - 1, delay * 2);
                }
                throw error;
            }
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const query = userInput.value.trim();
            if (!query) return;

            // Update UI for user message
            appendMessage('user', query);
            userInput.value = '';
            loadingIndicator.classList.remove('hidden');
            chatForm.querySelector('button').disabled = true;

            try {
                const data = await fetchWithRetry(query);
                const aiResponse = data.candidates?.[0]?.content?.parts?.[0]?.text || "I couldn't generate a response.";

                // Store in history for context
                messageHistory.push({ role: 'user', parts: [{ text: query }] });
                messageHistory.push({ role: 'model', parts: [{ text: aiResponse }] });

                appendMessage('ai', aiResponse);
            } catch (err) {
                errorMessage.textContent = "Unable to reach the AI after multiple attempts. Please check your connection and try again.";
                errorModal.classList.remove('hidden');
            } finally {
                loadingIndicator.classList.add('hidden');
                chatForm.querySelector('button').disabled = false;
            }
        });
    </script>
</body>
</html>
