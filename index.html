<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TP 5 - Assistant IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Personnalisation de la barre de défilement */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .typing-dot {
            animation: typing 1.4s infinite;
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: #3b82f6;
            margin-right: 2px;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-4px); }
        }
    </style>
</head>
<body class="bg-slate-50 h-screen flex flex-col font-sans">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 p-4 shadow-sm flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-lg text-white">
                <i class="fas fa-robot text-xl"></i>
            </div>
            <div>
                <h1 class="text-lg font-bold text-slate-800">Chatbot TP 5</h1>
                <p class="text-xs text-green-500 flex items-center gap-1">
                    <span class="w-2 h-2 bg-green-500 rounded-full"></span> Connecté à OpenRouter
                </p>
            </div>
        </div>
    </header>

    <!-- Zone de messages -->
    <main id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 max-w-4xl mx-auto w-full">
        <!-- Message de bienvenue -->
        <div class="flex items-start gap-3">
            <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-600">
                <i class="fas fa-robot text-sm"></i>
            </div>
            <div class="bg-white border border-slate-200 p-4 rounded-2xl rounded-tl-none shadow-sm max-w-[85%]">
                <p class="text-slate-700">Bonjour ! J'ai mis à jour le modèle de l'IA. Comment puis-je vous aider pour votre TP aujourd'hui ?</p>
            </div>
        </div>
    </main>

    <!-- Zone de saisie -->
    <footer class="bg-white border-t border-slate-200 p-4 pb-8 md:pb-4">
        <div class="max-w-4xl mx-auto relative">
            <form id="chat-form" class="flex gap-2">
                <input 
                    type="text" 
                    id="user-input" 
                    placeholder="Posez votre question ici..." 
                    class="flex-1 border border-slate-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                    autocomplete="off"
                >
                <button 
                    type="submit" 
                    id="send-btn"
                    class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-medium transition-colors flex items-center gap-2 disabled:opacity-50"
                >
                    <span class="hidden md:inline">Envoyer</span>
                    <i class="fas fa-paper-plane"></i>
                </button>
            </form>
            <p class="text-[10px] text-center text-slate-400 mt-2 italic">
                Propulsé par OpenRouter API - TP 5 Développement Web
            </p>
        </div>
    </footer>

    <script>
        // CONFIGURATION
        const API_KEY = "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";
        const API_URL = "https://openrouter.ai/api/v1/chat/completions";
        // Utilisation d'un modèle gratuit plus stable et reconnu
        const MODEL = "google/gemini-2.0-flash-001"; 

        const chatContainer = document.getElementById('chat-container');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        // Historique de la conversation
        let messages = [
            { role: "system", content: "Tu es un assistant utile et concis répondant en français." }
        ];

        // Fonction pour ajouter un message à l'UI
        function appendMessage(role, text) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex items-start gap-3 ${role === 'user' ? 'flex-row-reverse' : ''}`;
            
            const iconBg = role === 'user' ? 'bg-slate-600' : 'bg-blue-100';
            const iconColor = role === 'user' ? 'text-white' : 'text-blue-600';
            const icon = role === 'user' ? 'fa-user' : 'fa-robot';
            
            const msgBg = role === 'user' ? 'bg-blue-600 text-white' : 'bg-white border border-slate-200 text-slate-700';
            const rounded = role === 'user' ? 'rounded-tr-none' : 'rounded-tl-none';

            wrapper.innerHTML = `
                <div class="w-8 h-8 rounded-full ${iconBg} flex items-center justify-center ${iconColor} flex-shrink-0">
                    <i class="fas ${icon} text-sm"></i>
                </div>
                <div class="${msgBg} p-4 rounded-2xl ${rounded} shadow-sm max-w-[85%] whitespace-pre-wrap">
                    ${text}
                </div>
            `;
            
            chatContainer.appendChild(wrapper);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Fonction pour afficher l'indicateur de chargement
        function showTyping() {
            const typingDiv = document.createElement('div');
            typingDiv.id = 'typing-indicator';
            typingDiv.className = 'flex items-start gap-3';
            typingDiv.innerHTML = `
                <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-600">
                    <i class="fas fa-robot text-sm"></i>
                </div>
                <div class="bg-white border border-slate-200 p-4 rounded-2xl rounded-tl-none shadow-sm">
                    <span class="typing-dot"></span>
                    <span class="typing-dot"></span>
                    <span class="typing-dot"></span>
                </div>
            `;
            chatContainer.appendChild(typingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Appel API avec gestion du retry exponentiel
        async function fetchAIResponse(userText) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'HTTP-Referer': window.location.origin || "http://localhost", 
                        'X-Title': 'TP 5 Chatbot',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: MODEL,
                        messages: [...messages, { role: "user", content: userText }]
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    // Si le modèle "flash" échoue, on peut tenter une alternative ou logger l'erreur
                    throw new Error(data.error?.message || `Erreur serveur : ${response.status}`);
                }

                if (!data.choices || data.choices.length === 0) {
                    throw new Error("Aucune réponse reçue de l'IA.");
                }

                return data.choices[0].message.content;
            } catch (error) {
                console.error("Erreur API complète:", error);
                return `Désolé, une erreur est survenue : ${error.message}. Vérifiez que votre clé API est toujours valide.`;
            }
        }

        // Gestionnaire d'envoi
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text) return;

            // Interface utilisateur
            userInput.value = '';
            userInput.disabled = true;
            sendBtn.disabled = true;
            
            appendMessage('user', text);
            showTyping();

            // Logique
            const aiResponse = await fetchAIResponse(text);
            
            // Retrait de l'indicateur et ajout de la réponse
            const typingIndicator = document.getElementById('typing-indicator');
            if (typingIndicator) typingIndicator.remove();
            
            appendMessage('assistant', aiResponse);
            
            // Mise à jour de l'historique
            messages.push({ role: "user", content: text });
            messages.push({ role: "assistant", content: aiResponse });

            // Réactivation
            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();
        });
    </script>
</body>
</html>
